<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventory - Apna Billing</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Barcode Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800 fixed inset-0 h-[100dvh] w-screen overflow-hidden overscroll-none">

    <!-- App Header -->
    <header class="bg-slate-800 text-white flex justify-between items-center h-14 px-4 absolute top-0 w-full z-50 shadow-md">
        <div class="flex items-center gap-3">
            <button onclick="document.getElementById('mySidebar').style.transform = 'translateX(0)'" class="text-2xl focus:outline-none">☰</button>
            <h1 class="text-lg font-bold">Apna Billing</h1>
        </div>
        <div class="relative"><span class="text-xl">📦</span></div>
    </header>

    <!-- App Sidebar -->
    <div id="mySidebar" class="fixed top-0 left-0 h-full w-64 bg-slate-900 text-gray-300 z-[60] transform -translate-x-full transition-transform duration-300 shadow-2xl pt-14">
        <button onclick="document.getElementById('mySidebar').style.transform = 'translateX(-100%)'" class="absolute top-3 right-4 text-3xl hover:text-white">&times;</button>
        <div class="overflow-y-auto h-full pb-20">
            <a href="index.html" class="block py-3 px-6 text-sm hover:bg-slate-800 hover:text-white border-b border-slate-700">🏠 Dashboard</a>
            <a href="sell.html" class="block py-3 px-6 text-sm hover:bg-slate-800 hover:text-white border-b border-slate-700">🛒 Sell Product</a>
            
            <div id="admin-nav-links">
                <a href="purchase.html" class="block py-3 px-6 text-sm hover:bg-slate-800 hover:text-white border-b border-slate-700">🚚 Purchase Entry</a>
                <a href="khata.html" class="block py-3 px-6 text-sm hover:bg-slate-800 hover:text-white border-b border-slate-700">📒 Ledger Khata</a>
                <a href="reports.html" class="block py-3 px-6 text-sm hover:bg-slate-800 hover:text-white border-b border-slate-700">📊 P&L Reports</a>
                <a href="add_product.html" class="block py-3 px-6 text-sm hover:bg-slate-800 hover:text-white border-b border-slate-700">➕ Add Product</a>
            </div>
            
            <a href="inventory.html" class="block py-3 px-6 text-sm bg-slate-800 text-white font-bold border-l-4 border-blue-500 border-b border-slate-700">📦 Inventory</a>
            <a href="bills.html" class="block py-3 px-6 text-sm hover:bg-slate-800 hover:text-white border-b border-slate-700">📜 Sales History</a>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="absolute top-14 bottom-0 w-full flex flex-col bg-gray-50">
        
        <!-- Search and Scanner Section -->
        <div class="bg-white px-4 py-4 z-40 border-b border-gray-200 shadow-sm shrink-0">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-bold text-slate-800">Stock Inventory</h2>
                <span class="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded">Total Items: <span id="total-items">0</span></span>
            </div>

            <div class="flex gap-2 relative">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
                    <input type="text" id="search-box" placeholder="Search by name or barcode..." autocomplete="off" class="w-full pl-9 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-bold">
                </div>
                <!-- Camera Button -->
                <button onclick="openScanner()" class="bg-blue-600 text-white px-4 py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 text-xl active:scale-95 transition-transform">📷</button>
            </div>
        </div>

        <!-- Inventory List Container -->
        <div id="inventory-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 pb-24">
            <div class="text-center p-8 text-gray-400 bg-white rounded-2xl border border-gray-100 mt-5">
                <p class="font-bold text-sm">Loading stock details... ⏳</p>
            </div>
        </div>

    </main>

    <!-- GENERAL SCANNER OVERLAY -->
    <div id="scanner-modal" class="fixed inset-0 z-[100] hidden flex-col bg-black">
        <div class="flex justify-between items-center p-4 text-white bg-slate-900 border-b border-slate-700">
            <h3 class="font-bold text-sm uppercase tracking-widest">Scan Barcode / IMEI</h3>
            <button onclick="closeScanner()" class="font-bold text-red-400 text-xs bg-red-400/20 px-3 py-1.5 rounded-lg">Close ✖</button>
        </div>
        <div class="w-full bg-black flex-1 flex flex-col justify-center relative">
            <div id="reader" class="w-full"></div>
            <p class="text-center text-gray-400 text-xs mt-6 absolute bottom-10 w-full font-bold">Point camera at the product barcode to search</p>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"; 
        
        const app = initializeApp({ 
            apiKey: "AIzaSyB8iVbF-qkIT23ttlcGbKUA1iB9ONprdPI", 
            projectId: "smartplan-96109", 
            appId: "1:266453436752:web:bbe7047a7de525017fc455" 
        });
        const db = getFirestore(app);

        let allProducts = [];
        let html5QrCode = null;
        let userRole = sessionStorage.getItem('userRole') || 'staff'; // Default to staff

        // Hide admin links if staff
        if (userRole !== 'admin') {
            document.getElementById('admin-nav-links').classList.add('hidden');
        }

        async function loadInventory() {
            try {
                const querySnapshot = await getDocs(collection(db, "Products"));
                allProducts = [];
                querySnapshot.forEach(doc => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });
                
                document.getElementById('total-items').innerText = allProducts.length;
                renderInventory(allProducts);
            } catch(e) {
                document.getElementById('inventory-container').innerHTML = `<p class="text-center text-red-500 font-bold mt-5">Failed to load inventory!</p>`;
            }
        }

        function renderInventory(productsToRender) {
            const container = document.getElementById('inventory-container');
            container.innerHTML = '';

            if(productsToRender.length === 0) {
                container.innerHTML = `<div class="text-center p-8 text-gray-400 bg-white rounded-2xl border border-gray-100 mt-5"><p class="font-bold text-sm">No products found!</p></div>`;
                return;
            }

            productsToRender.forEach(p => {
                let stockClass = p.stock > 5 ? "text-green-600 bg-green-50 border-green-200" : (p.stock > 0 ? "text-orange-600 bg-orange-50 border-orange-200" : "text-red-600 bg-red-50 border-red-200");
                let stockText = p.stock > 0 ? `${p.stock} in Stock` : "Out of Stock";

                // Staff security: Hide purchase price and supplier from staff
                let adminInfo = '';
                if(userRole === 'admin') {
                    adminInfo = `
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-dashed border-gray-200">
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Purchase Rate: <span class="text-slate-700">₹${p.purchasePrice || 0}</span></p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Supplier: <span class="text-slate-700">${p.supplier || 'N/A'}</span></p>
                        </div>
                    `;
                }

                // Show IMEI list if exists
                let imeiDisplay = '';
                if(p.imeiList && p.imeiList.length > 0) {
                    imeiDisplay = `<p class="text-[9px] text-blue-600 font-bold bg-blue-50 inline-block px-1.5 py-0.5 rounded mt-1 border border-blue-100">Has ${p.imeiList.length} IMEIs tracked</p>`;
                }

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="font-black text-slate-800 text-sm">${p.name}</h3>
                                <p class="text-[10px] text-gray-400 font-bold mt-0.5">Barcode: ${p.barcode || 'N/A'}</p>
                                ${imeiDisplay}
                            </div>
                            <span class="text-[10px] font-bold px-2 py-1 rounded border ${stockClass}">${stockText}</span>
                        </div>
                        
                        <div class="flex justify-between items-center mt-3">
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Selling Price</p>
                                <h4 class="font-extrabold text-blue-600 text-base mt-0.5">₹${p.sellPrice || 0}</h4>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">GST Slab</p>
                                <h4 class="font-extrabold text-slate-700 text-base mt-0.5">${p.gst || 0}%</h4>
                            </div>
                        </div>
                        ${adminInfo}
                    </div>
                `;
            });
        }

        // Search Functionality
        document.getElementById('search-box').addEventListener('input', (e) => {
            const txt = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(txt) || 
                (p.barcode && p.barcode.toLowerCase().includes(txt)) ||
                (p.imeiList && p.imeiList.some(imei => imei.toLowerCase().includes(txt)))
            );
            renderInventory(filtered);
        });

        // ================= SCANNER LOGIC =================
        window.openScanner = function() {
            const modal = document.getElementById('scanner-modal');
            modal.classList.remove('hidden'); 
            modal.classList.add('flex');

            html5QrCode = new Html5Qrcode("reader");
            
            // This will prompt for camera permission automatically
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 100 } }, 
                (decodedText) => {
                    // On Success: Beep/Vibrate (if supported) and Search
                    if(navigator.vibrate) navigator.vibrate(100);
                    
                    document.getElementById('search-box').value = decodedText;
                    document.getElementById('search-box').dispatchEvent(new Event('input')); // Trigger search
                    
                    closeScanner(); // Auto close
                }, 
                (err) => {
                    // Ignore continuous scanning errors
                }
            ).catch(err => {
                alert("Please allow Camera permission to use the scanner!");
                closeScanner();
            });
        };

        window.closeScanner = function() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    html5QrCode = null;
                    const modal = document.getElementById('scanner-modal');
                    modal.classList.add('hidden'); 
                    modal.classList.remove('flex');
                }).catch(e => {
                    const modal = document.getElementById('scanner-modal');
                    modal.classList.add('hidden'); 
                    modal.classList.remove('flex');
                });
            }
        };

        // Initialize Data
        loadInventory();
    </script>
</body>
</html>
